# Agent pipeline (pytest): push, manual run, or daily schedule.

name: Agents CI

on:
  push:
    branches: [main, master]
    paths:
      - "agents/**"
      - ".github/workflows/agents-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "agents/**"
      - ".github/workflows/agents-ci.yml"

  # Run from GitHub → Actions → this workflow → "Run workflow" (after you verified it once).
  workflow_dispatch:

  # Runs daily at 06:00 UTC (~07:00 CET). Change cron or disable if you do not want scheduled runs.
  # Note: GitHub pauses cron after ~60 days of repo inactivity.
  schedule:
    - cron: "0 6 * * *"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev deps
        run: pip install -e "./agents[dev]"

      - name: Run tests
        run: pytest agents/tests -v --tb=short
