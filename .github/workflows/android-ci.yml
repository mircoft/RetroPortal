# Builds debug APK on every push to main/master (and on PRs).
# Requires no secrets for a standard open-source build.

name: Android CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components (API 35, NDK, CMake)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Gradle wrapper validation
        run: chmod +x gradlew

      - name: Assemble Debug
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
